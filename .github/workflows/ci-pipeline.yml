name: CI Pipeline
 
on:
  push:
    branches: [main]
 
jobs:
 
  # ── Job 1: Lint ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: npm install
 
      - name: Run lint
        run: npm run lint
 
  # ── Job 2: Test ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: npm install
 
      - name: Build the app
        run: npm run build
 
      - name: Start the app in background
        run: npm start &
 
      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000
 
      - name: Run tests
        run: npm test
 
  # ── Job 3: Build and Push ────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
